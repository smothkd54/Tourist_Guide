services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - CORS_ORIGINS=http://localhost:*|http://127.0.0.1:*  # change to your domain for deployment
      - GUNICORN_WORKERS=2
      - MODEL_PATH=/app/models/landmark_classifier.keras
      - LOG_DIR=/app/logs
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    restart: unless-stopped
