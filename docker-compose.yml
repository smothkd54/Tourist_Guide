services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

  web:
    build: .
    expose:
      - "5000"
    env_file:
      - .env
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
